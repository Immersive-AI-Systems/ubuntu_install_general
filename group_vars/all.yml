# Default install settings.

# Use the inventory's ansible_user as the install owner by default.
target_user: "{{ ansible_user | default('root') }}"

# The default install enables the full general setup.
# Keypad bindings remain off by default.

# Package installation toggles.
install_base_packages: true
install_cli_tools: true
install_warp: false
install_docker: true
install_nvidia_container_toolkit: true

# Package lists.
apt_extra_packages:
  - libasound2-dev
  - libasound2-plugins
  - libportaudio2
  - ffmpeg
  - nvidia-settings
cli_packages:
  - joe
  - tmux
  - mc
  - htop
  - ack
  - ripgrep

# Conda settings.
install_anaconda: true
conda_version: "2023.09-0"
conda_installer_url: "https://repo.anaconda.com/archive/Anaconda3-{{ conda_version }}-Linux-x86_64.sh"
conda_env_name: "ml"
conda_env_python: "3.10"
conda_extra_conda_packages:
  - spyder
  - spyder-kernels
conda_pip_packages:
  - datasets
  - diffusers==0.25.0
  - transformers
  - accelerate
conda_auto_activate_env: ""
install_pytorch: true
pytorch_index_url: "https://download.pytorch.org/whl/cu121"
pytorch_packages:
  - "torch==2.1.1"
  - "torchvision==0.16.1"
  - "torchaudio==2.1.1"
numpy_pin: "<2"
install_cuda_python: true
cuda_python_version: "12.1.*"
cuda_python_pip_package: "cuda-python=={{ cuda_python_version }}"

# GNOME settings.
configure_gnome_appearance: true
configure_gnome_favorites: true
configure_gnome_keybindings: true
enable_keypad_bindings: false
install_google_chrome: true

# Shell settings.
configure_bashrc_aliases: true
set_git_default_branch: true
bashrc_aliases_block: |
  alias n="watch -n 1 nvidia-smi"
  alias r="realpath"
  alias ca='conda activate '
  alias cl='conda env list'
  alias tl='tmux list'
  alias ta='tmux a -t '
  alias la='ls -la'
  alias gs='git status'
  alias gp='git pull'
  export CUDA_HOME="/usr/local/cuda"
  export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"

  function go() {
    if [ -z "$1" ]; then
      echo "Provide a commit message."
      return 1
    fi
    git add -A
    git commit -m "$*"
    git push
  }

  function gi() {
    git pull
  }

# Compatibility helpers for Ubuntu package naming.
libgl_package: "{{ 'libgl1' if ansible_distribution_version is version('24.04', '>=') else 'libgl1-mesa-glx' }}"
libegl_package: "{{ 'libegl1' if ansible_distribution_version is version('24.04', '>=') else 'libegl1-mesa' }}"
libasound_package: "{{ 'libasound2t64' if ansible_distribution_version is version('24.04', '>=') else 'libasound2' }}"
