---
- hosts: "{{ host_target | default('ubuntu') }}"
  become: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Ensure target_user is defined
      ansible.builtin.assert:
        that:
          - target_user is defined
          - target_user | length > 0
        fail_msg: "target_user is not defined."

  tasks:
    - name: Install core Ubuntu packages
      ansible.builtin.apt:
        update_cache: true
        state: present
        pkg: >-
          {{
            [
              libgl_package,
              libegl_package,
              'libxrandr2',
              'libxss1',
              'libxcursor1',
              'libxcomposite1',
              libasound_package,
              'libxi6',
              'libxtst6',
              'curl',
              'ca-certificates',
              'build-essential',
              'git',
              'openssh-server'
            ] + apt_extra_packages
          }}
      when: install_base_packages | bool

    - name: Install general CLI tools
      ansible.builtin.apt:
        update_cache: true
        state: present
        pkg: "{{ cli_packages }}"
      when: install_cli_tools | bool

    - name: Check if Warp terminal is installed
      ansible.builtin.command: dpkg-query -W -f='${Status}' warp-terminal
      register: warp_dpkg
      failed_when: false
      changed_when: false
      when:
        - install_warp | bool
        - ansible_architecture == 'x86_64'

    - name: Download Warp terminal .deb
      ansible.builtin.get_url:
        url: "https://app.warp.dev/download?package=deb"
        dest: "/tmp/warp.deb"
        mode: "0644"
        force: false
      when:
        - install_warp | bool
        - ansible_architecture == 'x86_64'
        - warp_dpkg.rc != 0

    - name: Install Warp terminal
      ansible.builtin.apt:
        deb: "/tmp/warp.deb"
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive
      when:
        - install_warp | bool
        - ansible_architecture == 'x86_64'
        - warp_dpkg.rc != 0

    - name: Remove legacy Docker packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - docker-compose-v2
          - containerd
          - runc
        state: absent
        purge: true
      when: install_docker | bool
      ignore_errors: true

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      when: install_docker | bool

    - name: Ensure Docker apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      when: install_docker | bool

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      when: install_docker | bool

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        mode: "0644"
      when: install_docker | bool

    - name: Install Docker Engine packages
      ansible.builtin.apt:
        update_cache: true
        state: present
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
      when: install_docker | bool

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present
      when: install_docker | bool

    - name: Add target user to docker group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true
      when: install_docker | bool

    - name: Ensure Docker config directory exists
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: "0755"
      when: install_docker | bool

    - name: Configure Docker default logging driver
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "log-driver": "local"
          }
      notify: Restart Docker
      when: install_docker | bool

    - name: Add NVIDIA libnvidia-container GPG key
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      when: install_nvidia_container_toolkit | bool

    - name: Add NVIDIA Container Toolkit apt repo
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#' > /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
      when: install_nvidia_container_toolkit | bool

    - name: Install NVIDIA Container Toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true
      when: install_nvidia_container_toolkit | bool

    - name: Enable and start containerd service
      ansible.builtin.service:
        name: containerd
        enabled: true
        state: started
      when: install_docker | bool

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started
      when: install_docker | bool

    - name: Configure Docker to use NVIDIA runtime by default
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker --set-as-default
      register: nvidia_ctk_result
      changed_when: "'updated config' in nvidia_ctk_result.stdout or 'Wrote updated config' in nvidia_ctk_result.stdout"
      failed_when: false
      notify: Restart Docker
      when:
        - install_docker | bool
        - install_nvidia_container_toolkit | bool

    - name: Advise re-login for docker group
      ansible.builtin.debug:
        msg: "If '{{ target_user }}' was newly added to the docker group, log out and back in or run newgrp docker."
      when: install_docker | bool

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
